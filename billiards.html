<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="screen-orientation" content="landscape">
<title>联机台球 · Online Billiards</title>
<style>
/* ═══ LIGHT THEME TOKENS ═══ */
:root{
  --bg:       #f0f4f0;
  --surface:  #ffffff;
  --surface2: #f5f7f5;
  --border:   #d8e4d8;
  --accent:   #2e8b5a;
  --accent2:  #4aab78;
  --text:     #1a2e1a;
  --text-m:   #5a7a5a;
  --gold:     #b07d20;
  --danger:   #c0392b;
  --purple:   #6d4fc0;
  --shadow:   rgba(0,60,20,.10);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  font-size:12px;
  display:flex;
  flex-direction:column;
  user-select:none;
}

/* ════════════════════════════
   LAYOUT: landscape flex row
════════════════════════════ */
#app{
  display:flex;
  flex-direction:row;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* ── Sidebar ── */
.sidebar{
  width:170px;
  min-width:150px;
  flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow-y:auto;
  overflow-x:hidden;
}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.sidebar-right{
  border-right:none;
  border-left:1px solid var(--border);
}

/* ── Center (canvas column) ── */
.center{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  align-items:stretch;
  background:var(--bg);
}

/* ── Topbar ── */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:5px 10px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  gap:6px;
}
.logo{display:flex;align-items:center;gap:5px;}
.logo h1{font-size:13px;font-weight:700;color:var(--accent);}
.logo sub{font-size:9px;color:var(--text-m);margin-left:2px;}
.turn-bar{
  display:flex;align-items:center;gap:6px;
  flex:1;justify-content:center;
}
#turnText{font-size:11px;color:var(--text-m);}
.badge{
  font-size:9px;font-weight:700;
  padding:2px 7px;border-radius:4px;
  background:var(--accent);color:#fff;
}
.badge.wait{background:var(--gold);}
.badge.brk{background:var(--purple);}
.topbar-actions{display:flex;gap:5px;align-items:center;}

/* ── Canvas wrap ── */
.canvas-wrap{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:6px;
  min-height:0;
  position:relative;
}
#gameCanvas{
  display:block;
  border-radius:5px;
  box-shadow:0 4px 18px var(--shadow),
             0 0 0 3px #1b5e38,
             0 0 0 6px #7a4520;
  cursor:crosshair;
  /* fills available space */
  max-width:100%;
  max-height:100%;
}

/* ── Hint ── */
.hint{
  font-size:9px;color:var(--text-m);
  text-align:center;padding:3px 6px;
  border-top:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
}

/* ── Section label ── */
.sec-lbl{
  font-size:9px;text-transform:uppercase;letter-spacing:.9px;
  color:var(--text-m);padding:7px 10px 4px;
  border-bottom:1px solid var(--border);
}

/* ── Generic blocks ── */
.blk{padding:8px 10px;border-bottom:1px solid var(--border);}

/* ── Dot / status ── */
.net-row{display:flex;align-items:center;gap:5px;margin-bottom:7px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;}
.dot.on{background:var(--accent);box-shadow:0 0 4px var(--accent);}
.dot.wait{background:var(--gold);animation:blink 1.3s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Peer box ── */
.peer-box{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:5px;padding:5px 7px;
  font-family:monospace;font-size:10px;color:var(--accent);
  word-break:break-all;margin-bottom:6px;line-height:1.4;
}
.copy-btn{
  float:right;font-size:9px;cursor:pointer;
  color:var(--accent);border:none;background:none;padding:0;margin-left:4px;
  font-weight:700;
}
.input-row{display:flex;gap:4px;margin-bottom:5px;}
input[type=text]{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:5px;color:var(--text);padding:5px 7px;
  font-size:11px;outline:none;min-width:0;
  transition:border-color .2s;
}
input[type=text]:focus{border-color:var(--accent);}
input[type=text]::placeholder{color:var(--text-m);}

/* ── Buttons ── */
.btn{
  background:var(--accent);color:#fff;
  border:none;border-radius:6px;padding:5px 9px;
  font-size:11px;font-weight:700;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.btn:active{filter:brightness(.9);}
.btn.sec{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-full{width:100%;}

/* ── Aim dial ── */
.aim-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;padding:6px 10px 8px;}
#cueAimCanvas{border-radius:50%;cursor:crosshair;border:1.5px solid var(--border);display:block;}
.aim-coord{font-size:9px;color:var(--accent);font-family:monospace;}
.aim-lbl{font-size:9px;color:var(--text-m);text-align:center;line-height:1.5;}

/* ── Power ── */
.pwr-blk{padding:7px 10px 9px;}
.pwr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.pwr-val{font-size:13px;font-weight:700;color:var(--accent);}
input[type=range]{
  width:100%;-webkit-appearance:none;
  height:4px;border-radius:2px;
  background:var(--surface2);
  border:1px solid var(--border);
  outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 1px 3px rgba(0,0,0,.25);
}
.pwr-bar-bg{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:5px;border:1px solid var(--border);}
.pwr-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .1s;}

/* ── Score ── */
.score-row{display:flex;gap:6px;padding:7px 10px;}
.sc-card{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:7px;padding:6px 4px;text-align:center;
  transition:border-color .2s;
}
.sc-card.active{border-color:var(--accent);background:#edf7f1;}
.sc-name{font-size:9px;color:var(--text-m);}
.sc-pts{font-size:20px;font-weight:700;color:var(--text);line-height:1.1;}
.sc-type{font-size:8px;color:var(--text-m);margin-top:1px;}

/* ── Ball tray ── */
.tray{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;padding:6px 10px 8px;}
.bi{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,.5);
  box-shadow:inset -1px -2px 3px rgba(0,0,0,.3),inset 1px 1px 3px rgba(255,255,255,.3);
  opacity:1;transition:opacity .3s;
}
.bi.out{opacity:.15;}

/* ── Log ── */
.log-area{
  flex:1;overflow-y:auto;padding:5px 8px;
  display:flex;flex-direction:column;gap:2px;
}
.log-area::-webkit-scrollbar{width:2px;}
.log-area::-webkit-scrollbar-thumb{background:var(--border);}
.li{
  padding:2px 5px;border-radius:3px;font-size:9.5px;
  background:var(--surface2);color:var(--text-m);
  border-left:2px solid transparent;
}
.li.good{border-left-color:var(--accent);color:var(--text);}
.li.bad{border-left-color:var(--danger);}
.li.info{border-left-color:var(--gold);}

/* ── Foul ── */
.foul-msg{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:rgba(192,57,43,.9);
  color:#fff;padding:6px 16px;border-radius:6px;
  font-weight:700;font-size:14px;pointer-events:none;
  opacity:0;transition:opacity .3s;z-index:10;
}
.foul-msg.show{opacity:1;}

/* ── Modal ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  z-index:100;backdrop-filter:blur(4px);
}
.overlay.hidden{display:none;}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:24px 20px;width:300px;
  text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.2);
}
.modal h2{font-size:18px;margin-bottom:6px;color:var(--accent);}
.modal p{color:var(--text-m);font-size:12px;margin-bottom:16px;line-height:1.6;}
.modal-btns{display:flex;gap:8px;justify-content:center;}

/* ── Toast ── */
#toast{
  position:fixed;bottom:16px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:var(--surface);border:1px solid var(--accent);
  color:var(--text);padding:7px 14px;border-radius:7px;
  font-size:12px;opacity:0;transition:all .25s;
  pointer-events:none;z-index:200;white-space:nowrap;
  box-shadow:0 4px 14px var(--shadow);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── Divider ── */
hr.div{border:none;border-top:1px solid var(--border);margin:0;}

/* ════════════════════════════
   PHONE LANDSCAPE RESPONSIVE
   (triggered by narrow height)
════════════════════════════ */
@media(max-height:520px){
  .sidebar{width:140px;min-width:130px;}
  .pwr-val{font-size:11px;}
  .sc-pts{font-size:16px;}
  .bi{width:19px;height:19px;font-size:7px;}
}
@media(max-height:420px){
  .sidebar{width:128px;min-width:120px;}
}

/* Hide right sidebar on very small screens */
@media(max-width:600px){
  .sidebar-right{display:none;}
}
</style>
</head>
<body>
<div id="app">

<!-- ══ LEFT SIDEBAR ══ -->
<div class="sidebar">
  <div class="sec-lbl">🌐 联机</div>
  <div class="blk">
    <div class="net-row">
      <div class="dot" id="netDot"></div>
      <span id="netStatus" style="font-size:10px;">初始化…</span>
    </div>
    <div style="font-size:9px;color:var(--text-m);margin-bottom:4px;">你的房间ID</div>
    <div class="peer-box">
      <button class="copy-btn" onclick="copyId()">复制</button>
      <span id="myPeerIdText">—</span>
    </div>
    <div class="input-row">
      <input type="text" id="connectInput" placeholder="对方ID" />
      <button class="btn" onclick="connectToPeer()">连</button>
    </div>
    <button class="btn sec btn-full" onclick="disconnectPeer()" style="font-size:10px;">断开</button>
  </div>

  <div class="sec-lbl">🎯 击打点</div>
  <div class="aim-wrap">
    <canvas id="cueAimCanvas" width="80" height="80"></canvas>
    <div class="aim-coord" id="aimCoord">(0.0, 0.0)</div>
    <div class="aim-lbl">点击设置旋转</div>
  </div>

  <div class="sec-lbl">⚡ 力度</div>
  <div class="pwr-blk">
    <div class="pwr-top">
      <span style="font-size:10px;color:var(--text-m);">力度</span>
      <span class="pwr-val" id="pwrVal">50% → 速度71%</span>
    </div>
    <input type="range" id="pwrSlider" min="2" max="100" value="50" oninput="updatePower(this.value)">
    <div class="pwr-bar-bg"><div class="pwr-bar" id="pwrBar" style="width:50%"></div></div>
  </div>

  <div class="sec-lbl">📊 比分</div>
  <div class="score-row">
    <div class="sc-card" id="sc1">
      <div class="sc-name">P1</div>
      <div class="sc-pts" id="pts1">0</div>
      <div class="sc-type" id="type1">—</div>
    </div>
    <div class="sc-card" id="sc2">
      <div class="sc-name">P2</div>
      <div class="sc-pts" id="pts2">0</div>
      <div class="sc-type" id="type2">—</div>
    </div>
  </div>

  <div class="sec-lbl">📝 记录</div>
  <div class="log-area" id="gameLog">
    <div class="li info">等待开球…</div>
  </div>
</div>

<!-- ══ CENTER ══ -->
<div class="center">
  <!-- Top bar -->
  <div class="topbar">
    <div class="logo">
      <span>🎱</span>
      <h1>Billiards</h1>
      <sub>8-Ball</sub>
    </div>
    <div class="turn-bar">
      <span id="turnText">玩家1 开球</span>
      <span class="badge brk" id="turnBadge">开球</span>
    </div>
    <div class="topbar-actions">
      <span id="modeLabel" style="font-size:9px;color:var(--text-m);">本地/联机</span>
      <button class="btn sec" onclick="resetGame()" style="font-size:10px;padding:4px 8px;">重开</button>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="gameCanvas"></canvas>
    <div class="foul-msg" id="foulMsg">⚠️ 犯规！</div>
  </div>

  <div class="hint">拖拽瞄准 · 左侧设旋转 · 拖拽距离=力度</div>
</div>

<!-- ══ RIGHT SIDEBAR ══ -->
<div class="sidebar sidebar-right">
  <div class="sec-lbl">⚪ 实心 1–7</div>
  <div class="tray" id="solidsTray"></div>

  <div class="sec-lbl">🎯 花球 9–15</div>
  <div class="tray" id="stripesTray"></div>

  <div class="sec-lbl">⚫ 8号球</div>
  <div style="display:flex;justify-content:center;padding:8px 0 6px;">
    <div class="bi" id="b8icon"
      style="width:28px;height:28px;font-size:11px;background:#222;
      box-shadow:inset -1px -2px 3px rgba(0,0,0,.5),inset 1px 1px 3px rgba(255,255,255,.1),
      0 0 6px rgba(100,80,200,.3);">8</div>
  </div>

  <div class="sec-lbl">📖 规则</div>
  <div class="blk" style="font-size:9.5px;color:var(--text-m);line-height:1.9;border-bottom:none;">
    🖱 拖拽方向击球<br>
    🎯 圆盘选旋转<br>
    ⚡ 拉距离=力度<br>
    🔵 先入袋定类型<br>
    🎱 清本类后打8<br>
    ☠️ 8号提前入=输<br>
    ⚠️ 母球入袋=犯规
  </div>
</div>

</div><!-- /#app -->

<!-- Modal -->
<div class="overlay hidden" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">🎱 游戏结束</h2>
    <p id="modalMsg">—</p>
    <div class="modal-btns">
      <button class="btn" onclick="resetGame();closeModal()">再来一局</button>
      <button class="btn sec" onclick="closeModal()">关闭</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// ═══════════════════════════════════════════════════
//  PHYSICS CONSTANTS  (球速已降低: max speed 13)
// ═══════════════════════════════════════════════════
// Canvas logical size – will be set dynamically
let CW=700, CH=380;
const RAIL  = 22;
const BR    = 9;
const FRICTION      = 0.995;   // 台泥摩擦（轻柔衰减，球能跑完全台）
const SPIN_FRIC     = 0.94;
const RESTITUTION   = 0.88;    // 球球弹性
const RAIL_REST     = 0.74;    // 台边弹性
const MIN_V         = 0.04;
const MAX_SPEED     = 5;       // 最大初速（手感自然）
let   PR    = 16;              // pocket radius, scaled later

const BCOLORS={
  0:'#f5f5f5',
  1:'#f7d348',2:'#2255cc',3:'#d44040',
  4:'#8844aa',5:'#e07832',6:'#2a8a3c',7:'#8B2500',
  8:'#1a1a1a',
  9:'#f7d348',10:'#2255cc',11:'#d44040',
  12:'#8844aa',13:'#e07832',14:'#2a8a3c',15:'#8B2500',
};

// ═══ STATE ═══
let canvas,ctx;
let balls=[],pockets=[];
let currentPlayer=1;
let playerTypes={1:null,2:null};
let scores={1:0,2:0};
let gameOver=false,firstBreak=true,ballsMoving=false,ballInHand=false;
let animId=null,thisTurnPocketed=[];

let aimDragging=false,aimOrigin={x:0,y:0},aimCurrent={x:0,y:0};
let canvasRect=null;
let cueOfs={x:0,y:0};
let power=50;

let peer=null,conn=null,isHost=false,onlineMode=false,myPlayerId=1;

// ═══ BALL ═══
class Ball{
  constructor(id,x,y){
    this.id=id;this.x=x;this.y=y;
    this.vx=0;this.vy=0;this.sx=0;this.sy=0;
    this.r=BR;this.pocketed=false;
    this.color=BCOLORS[id]||'#888';
    this.isStripe=id>=9&&id<=15;
    this.isSolid=id>=1&&id<=7;
    this.isCue=id===0;this.is8=id===8;
  }
  get speed(){return Math.hypot(this.vx,this.vy);}
  moving(){return this.speed>MIN_V||Math.abs(this.sx)>.007||Math.abs(this.sy)>.007;}
  update(){
    if(this.pocketed)return;
    this.vx+=this.sx*.04;this.vy+=this.sy*.04;
    this.sx*=SPIN_FRIC;this.sy*=SPIN_FRIC;
    this.vx*=FRICTION;this.vy*=FRICTION;
    if(Math.abs(this.vx)<MIN_V&&Math.abs(this.vy)<MIN_V){this.vx=0;this.vy=0;}
    this.x+=this.vx;this.y+=this.vy;
  }
  draw(c){
    if(this.pocketed)return;
    const{x,y,r}=this;
    c.save();
    // shadow
    c.beginPath();c.arc(x+1.5,y+2.5,r,0,Math.PI*2);
    c.fillStyle='rgba(0,0,0,.18)';c.fill();
    if(this.isStripe){
      c.beginPath();c.arc(x,y,r,0,Math.PI*2);
      c.fillStyle='#fff';c.fill();
      c.save();c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.clip();
      c.fillStyle=this.color;c.fillRect(x-r,y-r*.43,r*2,r*.86);
      c.restore();
    }else{
      c.beginPath();c.arc(x,y,r,0,Math.PI*2);
      c.fillStyle=this.color;c.fill();
    }
    // gloss
    const g=c.createRadialGradient(x-r*.28,y-r*.33,r*.04,x,y,r);
    g.addColorStop(0,'rgba(255,255,255,.55)');
    g.addColorStop(.55,'rgba(255,255,255,.05)');
    g.addColorStop(1,'rgba(0,0,0,.15)');
    c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fillStyle=g;c.fill();
    // number
    if(this.id>0){
      const nr=r*(this.isStripe?.46:.49);
      c.beginPath();c.arc(x,y,nr,0,Math.PI*2);
      c.fillStyle=this.isStripe?this.color:'rgba(255,255,255,.88)';c.fill();
      c.fillStyle=this.isStripe?'#fff':(this.id===8?'#fff':'#222');
      c.font=`bold ${r*.72}px Arial`;
      c.textAlign='center';c.textBaseline='middle';
      c.fillText(this.id,x,y);
    }
    if(this.isCue){
      const dx=x+cueOfs.x*r*.52,dy=y+cueOfs.y*r*.52;
      c.beginPath();c.arc(dx,dy,2,0,Math.PI*2);
      c.fillStyle='rgba(46,139,90,.95)';c.fill();
    }
    c.restore();
  }
}

// ═══ TABLE ═══
function drawTable(){
  // felt
  const fg=ctx.createLinearGradient(RAIL,RAIL,CW-RAIL,CH-RAIL);
  fg.addColorStop(0,'#256040');fg.addColorStop(.5,'#3b8760');fg.addColorStop(1,'#256040');
  ctx.fillStyle=fg;ctx.fillRect(RAIL,RAIL,CW-RAIL*2,CH-RAIL*2);
  // texture
  ctx.strokeStyle='rgba(255,255,255,.022)';ctx.lineWidth=1;
  for(let i=RAIL;i<CW-RAIL;i+=16){ctx.beginPath();ctx.moveTo(i,RAIL);ctx.lineTo(i,CH-RAIL);ctx.stroke();}
  for(let j=RAIL;j<CH-RAIL;j+=16){ctx.beginPath();ctx.moveTo(RAIL,j);ctx.lineTo(CW-RAIL,j);ctx.stroke();}
  // lines
  const bx=Math.round(CW*.27);
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(bx,RAIL);ctx.lineTo(bx,CH-RAIL);ctx.stroke();ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(bx,CH/2,3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.14)';ctx.fill();
  ctx.beginPath();ctx.arc(CW*.65,CH/2,3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.05)';ctx.setLineDash([7,7]);
  ctx.beginPath();ctx.moveTo(CW/2,RAIL);ctx.lineTo(CW/2,CH-RAIL);ctx.stroke();ctx.setLineDash([]);
  // cushions
  const mkC=(x,y,w,h,v)=>{
    const g2=ctx.createLinearGradient(x,y,v?x+w:x,v?y:y+h);
    g2.addColorStop(0,'#0c2b1c');g2.addColorStop(.4,'#1c5235');g2.addColorStop(1,'#0c2b1c');
    ctx.fillStyle=g2;ctx.fillRect(x,y,w,h);
  };
  mkC(0,0,CW,RAIL,false);mkC(0,CH-RAIL,CW,RAIL,false);
  mkC(0,0,RAIL,CH,true);mkC(CW-RAIL,0,RAIL,CH,true);
  ctx.strokeStyle='rgba(60,140,100,.5)';ctx.lineWidth=1.2;
  ctx.strokeRect(RAIL,RAIL,CW-RAIL*2,CH-RAIL*2);
  // wood border
  const wg=ctx.createLinearGradient(0,0,0,CH);
  wg.addColorStop(0,'#7a4520');wg.addColorStop(.5,'#9c5a28');wg.addColorStop(1,'#7a4520');
  ctx.strokeStyle=wg;ctx.lineWidth=4.5;ctx.strokeRect(2,2,CW-4,CH-4);
  ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1.2;ctx.strokeRect(1,1,CW-2,CH-2);
  // pockets
  for(const p of pockets){
    ctx.beginPath();ctx.arc(p.x,p.y,p.r+3.5,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.4)';ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='#050505';ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,p.r+1.2,0,Math.PI*2);
    ctx.strokeStyle='rgba(90,50,20,.7)';ctx.lineWidth=2;ctx.stroke();
  }
}

// ═══ AIM LINE ═══
function drawAimLine(){
  const cue=getBall(0);
  if(!cue||cue.pocketed||ballsMoving||gameOver)return;
  if(aimDragging){
    const dx=aimOrigin.x-aimCurrent.x,dy=aimOrigin.y-aimCurrent.y;
    const dist=Math.hypot(dx,dy);
    if(dist<3)return;
    const nx=dx/dist,ny=dy/dist;
    // cue stick ghost
    ctx.save();ctx.strokeStyle='rgba(180,140,60,.5)';ctx.lineWidth=3.5;ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(cue.x-nx*(cue.r+.5),cue.y-ny*(cue.r+.5));
    ctx.lineTo(cue.x-nx*(cue.r+Math.min(dist,90)),cue.y-ny*(cue.r+Math.min(dist,90)));
    ctx.stroke();ctx.restore();
    // aim line
    const ll=Math.min(dist*3,220);
    ctx.save();
    const lg=ctx.createLinearGradient(cue.x+nx*cue.r,cue.y+ny*cue.r,cue.x+nx*(cue.r+ll),cue.y+ny*(cue.r+ll));
    lg.addColorStop(0,'rgba(46,139,90,.9)');lg.addColorStop(.55,'rgba(46,139,90,.4)');lg.addColorStop(1,'rgba(46,139,90,0)');
    ctx.strokeStyle=lg;ctx.lineWidth=1.4;ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.moveTo(cue.x+nx*cue.r,cue.y+ny*cue.r);ctx.lineTo(cue.x+nx*(cue.r+ll),cue.y+ny*(cue.r+ll));
    ctx.stroke();ctx.setLineDash([]);ctx.restore();
    // reflection
    predictRef(cue.x+nx*cue.r,cue.y+ny*cue.r,nx,ny,ll+80);
  }else{
    ctx.save();ctx.beginPath();ctx.arc(cue.x,cue.y,cue.r+3.5,0,Math.PI*2);
    ctx.strokeStyle='rgba(46,139,90,.28)';ctx.lineWidth=1.2;ctx.stroke();ctx.restore();
  }
}
function predictRef(sx,sy,nx,ny,len){
  const step=3;let x=sx+nx*step,y=sy+ny*step,rem=len;
  ctx.save();ctx.strokeStyle='rgba(46,139,90,.15)';ctx.lineWidth=.9;ctx.setLineDash([3,5]);
  ctx.beginPath();ctx.moveTo(sx,sy);
  for(let s=0;s<500&&rem>0;s++){
    x+=nx*step;y+=ny*step;rem-=step;
    let hit=false;
    for(const b of balls){
      if(b.pocketed||b.isCue)continue;
      if(Math.hypot(x-b.x,y-b.y)<b.r+BR){ctx.lineTo(x,y);hit=true;break;}
    }
    if(hit)break;
    let bou=false;
    if(x<RAIL+BR){x=RAIL+BR;nx=-nx;bou=true;}
    if(x>CW-RAIL-BR){x=CW-RAIL-BR;nx=-nx;bou=true;}
    if(y<RAIL+BR){y=RAIL+BR;ny=-ny;bou=true;}
    if(y>CH-RAIL-BR){y=CH-RAIL-BR;ny=-ny;bou=true;}
    ctx.lineTo(x,y);
    if(bou&&rem<len*.3)break;
  }
  ctx.stroke();ctx.setLineDash([]);ctx.restore();
}

// ═══ PHYSICS ═══
function ballBall(a,b){
  const dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy),md=a.r+b.r;
  if(dist>=md||dist<.001)return;
  const ov=(md-dist)/2,nx=dx/dist,ny=dy/dist;
  a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;
  const dvx=b.vx-a.vx,dvy=b.vy-a.vy,dot=dvx*nx+dvy*ny;
  if(dot>=0)return;
  const imp=-(1+RESTITUTION)*dot/2;
  a.vx-=imp*nx;a.vy-=imp*ny;b.vx+=imp*nx;b.vy+=imp*ny;
}
function walls(b){
  const L=RAIL+b.r,R=CW-RAIL-b.r,T=RAIL+b.r,B=CH-RAIL-b.r;
  if(b.x<L){b.x=L;b.vx=Math.abs(b.vx)*RAIL_REST;}
  if(b.x>R){b.x=R;b.vx=-Math.abs(b.vx)*RAIL_REST;}
  if(b.y<T){b.y=T;b.vy=Math.abs(b.vy)*RAIL_REST;}
  if(b.y>B){b.y=B;b.vy=-Math.abs(b.vy)*RAIL_REST;}
}
function chkPockets(){
  const n=[];
  for(const b of balls){
    if(b.pocketed)continue;
    for(const p of pockets){
      if(Math.hypot(b.x-p.x,b.y-p.y)<p.r+b.r*.35){b.pocketed=true;n.push(b);break;}
    }
  }
  return n;
}
function physStep(){
  for(const b of balls)b.update();
  for(let p=0;p<3;p++){
    for(let i=0;i<balls.length;i++)for(let j=i+1;j<balls.length;j++){
      const a=balls[i],b=balls[j];
      if(a.pocketed||b.pocketed)continue;
      ballBall(a,b);
    }
  }
  for(const b of balls)if(!b.pocketed)walls(b);
  const np=chkPockets();if(np.length)handlePocketed(np);
  ballsMoving=balls.some(b=>!b.pocketed&&b.moving());
  if(!ballsMoving)endOfTurn();
}

// ═══ GAME LOGIC ═══
function handlePocketed(newly){
  for(const b of newly){
    thisTurnPocketed.push(b);
    addLog(`入袋: ${b.isCue?'母球':'#'+b.id}`,b.isCue?'bad':'good');
    updateTray(b.id);
  }
}
function endOfTurn(){
  const poc=thisTurnPocketed.slice();thisTurnPocketed=[];
  const cuePoc=poc.some(b=>b.isCue);
  const e8Poc=poc.some(b=>b.is8);
  const other=poc.filter(b=>!b.isCue&&!b.is8);
  let sw=true;
  if(e8Poc){
    const myLeft=balls.filter(b=>!b.pocketed&&isMyBall(b,currentPlayer));
    if(myLeft.length===0&&!cuePoc&&!firstBreak){endGame(currentPlayer,'🏆 玩家'+currentPlayer+' 打进8号球获胜！');}
    else{endGame(3-currentPlayer,'玩家'+currentPlayer+' 提前打进8号球，对方获胜！');}
    return;
  }
  if(cuePoc){
    showFoul();addLog('玩家'+currentPlayer+' 犯规：母球入袋','bad');
    ballInHand=true;updBallInHandUI();
    sw=true;
  }else if(other.length>0){
    if(!playerTypes[1]&&!playerTypes[2]&&!firstBreak){
      const ft=other[0].isSolid?'solid':'stripe';
      playerTypes[currentPlayer]=ft;playerTypes[3-currentPlayer]=ft==='solid'?'stripe':'solid';
      updTypeUI();addLog('玩家'+currentPlayer+'定为'+(ft==='solid'?'实心':'花球'),'info');
    }
    const ot=playerTypes[currentPlayer];
    const gd=other.filter(b=>!ot||(ot==='solid'&&b.isSolid)||(ot==='stripe'&&b.isStripe));
    if(gd.length>0){scores[currentPlayer]+=gd.length;document.getElementById('pts'+currentPlayer).textContent=scores[currentPlayer];sw=false;}
  }
  firstBreak=false;
  if(sw){currentPlayer=3-currentPlayer;}
  updTurnUI();syncState();
}
function isMyBall(b,p){const t=playerTypes[p];if(!t)return false;return(t==='solid'&&b.isSolid)||(t==='stripe'&&b.isStripe);}
function updBallInHandUI(){
  const p=document.getElementById('turnBadge');
  if(ballInHand){p.textContent='放置母球';p.className='badge free';p.style.background='var(--accent2)';}
  else{p.textContent=ballsMoving?'运动中':'击球';p.className='badge';p.style.background='';}
}
function placeCueBall(x,y){
  const c=getBall(0);c.pocketed=false;c.vx=0;c.vy=0;c.sx=0;c.sy=0;
  c.x=Math.max(RAIL+BR+2,Math.min(CW-RAIL-BR-2,x));
  c.y=Math.max(RAIL+BR+2,Math.min(CH-RAIL-BR-2,y));
  // Check overlap
  for(const b of balls){if(b.isCue||b.pocketed)continue;if(Math.hypot(b.x-c.x,b.y-c.y)<b.r+c.r+3)return false;}
  ballInHand=false;updBallInHandUI();
  addLog('玩家'+currentPlayer+' 放置母球','info');
  if(conn&&conn.open)conn.send({type:'place',x:c.x,y:c.y});
  return true;
}
function replaceCue(){
  const c=getBall(0);c.pocketed=false;c.vx=0;c.vy=0;c.sx=0;c.sy=0;
  c.x=CW*.22;c.y=CH/2;
  for(let a=0;a<30;a++){
    let ov=false;
    for(const b of balls){if(b.isCue||b.pocketed)continue;if(Math.hypot(b.x-c.x,b.y-c.y)<b.r+c.r+2){ov=true;break;}}
    if(!ov)break;c.y+=7;if(c.y>CH-RAIL-BR)c.y=RAIL+BR+8;
  }
  addLog('母球已重置','info');
}
function getBall(id){return balls.find(b=>b.id===id);}
function shoot(dx,dy,pwr,remote=false){
  if(gameOver||ballsMoving)return;
  if(!remote&&onlineMode&&currentPlayer!==myPlayerId){showToast('还未到你的回合');return;}
  const cue=getBall(0);if(!cue||cue.pocketed)return;
  const dist=Math.hypot(dx,dy);if(dist<1)return;
  const nx=dx/dist,ny=dy/dist;
  if(ballInHand){ballInHand=false;updBallInHandUI();}
  // 平方根曲线：低力度有感觉，高力度不过分
  const spd=Math.sqrt(pwr/100)*MAX_SPEED;
  cue.vx=nx*spd;cue.vy=ny*spd;
  cue.sx=cueOfs.x*spd*.16;cue.sy=cueOfs.y*spd*.16;
  ballsMoving=true;
  addLog('玩家'+currentPlayer+' 出杆('+pwr+'%)','good');
  if(!remote&&conn&&conn.open)conn.send({type:'shot',dx,dy,pwr,cueOfs:{...cueOfs},cueX:cue.x,cueY:cue.y});
}

// ═══ SETUP ═══
function setupPockets(){
  const cx=CW/2,cy=CH/2;
  PR=Math.round(CW*0.023);
  pockets=[
    {x:RAIL+1,y:RAIL+1,r:PR},
    {x:cx,y:RAIL-2,r:PR-2},
    {x:CW-RAIL-1,y:RAIL+1,r:PR},
    {x:RAIL+1,y:CH-RAIL-1,r:PR},
    {x:cx,y:CH-RAIL+2,r:PR-2},
    {x:CW-RAIL-1,y:CH-RAIL-1,r:PR},
  ];
}
function setupBalls(){
  balls=[];
  balls.push(new Ball(0,CW*.27,CH/2));
  const rx=CW*.65,ry=CH/2,sp=BR*2.08;
  const rows=[[1],[2,3],[4,8,5],[6,7,9,10],[11,12,13,14,15]];
  for(let r=0;r<rows.length;r++){
    const row=rows[r];
    for(let c=0;c<row.length;c++){
      balls.push(new Ball(row[c],rx+r*sp,ry+(c-(row.length-1)/2)*sp));
    }
  }
}
function buildTrays(){
  const st=document.getElementById('solidsTray'),sp=document.getElementById('stripesTray');
  st.innerHTML='';sp.innerHTML='';
  for(let i=1;i<=7;i++){
    const d=document.createElement('div');d.className='bi';d.id='bi'+i;d.textContent=i;d.style.background=BCOLORS[i];st.appendChild(d);
  }
  for(let i=9;i<=15;i++){
    const d=document.createElement('div');d.className='bi';d.id='bi'+i;d.textContent=i;
    d.style.background='#fff';d.style.color=BCOLORS[i];d.style.border='1.5px solid '+BCOLORS[i];sp.appendChild(d);
  }
}
function updateTray(id){
  const el=document.getElementById('bi'+id);if(el)el.classList.add('out');
  if(id===8)document.getElementById('b8icon').classList.add('out');
}
function updTypeUI(){
  const t1=playerTypes[1],t2=playerTypes[2];
  document.getElementById('type1').textContent=t1?(t1==='solid'?'⚪实心':'🎯花球'):'—';
  document.getElementById('type2').textContent=t2?(t2==='solid'?'⚪实心':'🎯花球'):'—';
}

// ═══ GAME LOOP ═══
function gameLoop(){
  ctx.clearRect(0,0,CW,CH);
  drawTable();
  if(ballsMoving)physStep();
  for(const b of balls)b.draw(ctx);
  // 自由球：高亮提示
  if(ballInHand&&!ballsMoving&&(!onlineMode||currentPlayer===myPlayerId)){
    ctx.save();
    ctx.fillStyle='rgba(46,139,90,.08)';
    ctx.fillRect(RAIL,RAIL,CW-RAIL*2,CH-RAIL*2);
    ctx.strokeStyle='rgba(46,139,90,.25)';ctx.lineWidth=2;
    ctx.strokeRect(RAIL,RAIL,CW-RAIL*2,CH-RAIL*2);
    ctx.fillStyle='rgba(46,139,90,.9)';ctx.font='bold 14px system-ui';
    ctx.textAlign='center';ctx.fillText('点击桌面放置母球',CW/2,CH/2+5);
    ctx.restore();
  }
  drawAimLine();
  animId=requestAnimationFrame(gameLoop);
}

// ═══ TURN UI ═══
function updTurnUI(){
  document.getElementById('sc1').classList.toggle('active',currentPlayer===1);
  document.getElementById('sc2').classList.toggle('active',currentPlayer===2);
  const tb=document.getElementById('turnBadge'),tt=document.getElementById('turnText');

  else if(firstBreak){tt.textContent='玩家'+currentPlayer+' 开球';tb.className='badge brk';tb.textContent='开球';tb.style.background='';}

function showFoul(){const el=document.getElementById('foulMsg');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800);}
function endGame(w,msg){
  gameOver=true;cancelAnimationFrame(animId);animId=null;ballsMoving=false;
  addLog(msg,'info');
  setTimeout(()=>{document.getElementById('modalTitle').textContent='🏆 玩家'+w+' 获胜！';document.getElementById('modalMsg').textContent=msg;document.getElementById('overlay').classList.remove('hidden');},600);
}
function resetGame(){
  if(animId){cancelAnimationFrame(animId);animId=null;}
  gameOver=false;currentPlayer=1;playerTypes={1:null,2:null};scores={1:0,2:0};
  firstBreak=true;ballsMoving=false;thisTurnPocketed=[];aimDragging=false;ballInHand=false;
  document.getElementById('pts1').textContent='0';document.getElementById('pts2').textContent='0';
  document.getElementById('type1').textContent='—';document.getElementById('type2').textContent='—';
  document.getElementById('gameLog').innerHTML='<div class="li info">新局开始</div>';
  document.getElementById('b8icon').classList.remove('out');
  setupBalls();buildTrays();updTurnUI();updBallInHandUI();
  gameLoop();
}
function closeModal(){document.getElementById('overlay').classList.add('hidden');}

// ═══ CUE AIM DIAL ═══
function initDial(){
  const ac=document.getElementById('cueAimCanvas');
  const actx=ac.getContext('2d');
  const W=ac.width,H=ac.height,cx=W/2,cy=H/2,R=cx-3;
  function drawDial(){
    actx.clearRect(0,0,W,H);
    const bg=actx.createRadialGradient(cx-R*.3,cy-R*.33,R*.04,cx,cy,R);
    bg.addColorStop(0,'#e8f0e8');bg.addColorStop(1,'#b8d4c0');
    actx.beginPath();actx.arc(cx,cy,R,0,Math.PI*2);actx.fillStyle=bg;actx.fill();
    actx.strokeStyle='#c8d8c8';actx.lineWidth=1.2;actx.stroke();
    actx.strokeStyle='rgba(0,0,0,.1)';actx.lineWidth=.8;
    actx.beginPath();actx.moveTo(cx,cy-R);actx.lineTo(cx,cy+R);actx.stroke();
    actx.beginPath();actx.moveTo(cx-R,cy);actx.lineTo(cx+R,cy);actx.stroke();
    for(const f of[.33,.66]){actx.beginPath();actx.arc(cx,cy,R*f,0,Math.PI*2);actx.strokeStyle='rgba(0,0,0,.08)';actx.stroke();}
    const gl=actx.createRadialGradient(cx-R*.3,cy-R*.33,R*.03,cx,cy,R);
    gl.addColorStop(0,'rgba(255,255,255,.52)');gl.addColorStop(.5,'rgba(255,255,255,.04)');gl.addColorStop(1,'rgba(0,0,0,.1)');
    actx.beginPath();actx.arc(cx,cy,R,0,Math.PI*2);actx.fillStyle=gl;actx.fill();
    const px=cx+cueOfs.x*R*.7,py=cy+cueOfs.y*R*.7;
    actx.beginPath();actx.arc(px,py,3.5,0,Math.PI*2);
    actx.fillStyle='rgba(46,139,90,1)';actx.fill();
    actx.strokeStyle='rgba(0,0,0,.35)';actx.lineWidth=.8;actx.stroke();
  }
  drawDial();
  function onAim(e){
    e.preventDefault();
    const rect=ac.getBoundingClientRect();
    const cx2=e.touches?e.touches[0].clientX:e.clientX,cy2=e.touches?e.touches[0].clientY:e.clientY;
    let ox=(cx2-rect.left-cx)/R,oy=(cy2-rect.top-cy)/R;
    const l=Math.hypot(ox,oy);if(l>.85){ox=ox/l*.85;oy=oy/l*.85;}
    cueOfs={x:ox,y:oy};
    document.getElementById('aimCoord').textContent='('+ox.toFixed(2)+','+oy.toFixed(2)+')';
    drawDial();
  }
  ac.addEventListener('mousedown',e=>{ac.addEventListener('mousemove',onAim);onAim(e);});
  ac.addEventListener('mouseup',()=>ac.removeEventListener('mousemove',onAim));
  ac.addEventListener('mouseleave',()=>ac.removeEventListener('mousemove',onAim));
  ac.addEventListener('touchstart',onAim,{passive:false});
  ac.addEventListener('touchmove',onAim,{passive:false});
}

// ═══ POWER ═══
function updatePower(v){
  power=parseInt(v);
  const eff=Math.round(Math.sqrt(power/100)*100);
  document.getElementById('pwrVal').textContent=power+'% → 速度'+eff+'%';
  document.getElementById('pwrBar').style.width=power+'%';
}

// ═══ CANVAS INPUT ═══
function getCP(e){
  canvasRect=canvas.getBoundingClientRect();
  const sx=CW/canvasRect.width,sy=CH/canvasRect.height;
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(cx-canvasRect.left)*sx,y:(cy-canvasRect.top)*sy};
}
function canDown(e){
  if(gameOver)return;
  if(onlineMode&&currentPlayer!==myPlayerId)return;
  // 自由球：点击放置母球
  if(ballInHand){
    const cue=getBall(0);if(!cue)return;
    const p=getCP(e);
    if(p.x<RAIL||p.x>CW-RAIL||p.y<RAIL||p.y>CH-RAIL)return; // 不在台内
    if(placeCueBall(p.x,p.y)){syncState();return;}
    showToast('此处有球，请换位置');
    return;
  }
  if(ballsMoving)return;
  canvasRect=canvas.getBoundingClientRect();
  const p=getCP(e);
  // 只允许在球桌范围内拖拽
  if(p.x<RAIL||p.x>CW-RAIL||p.y<RAIL||p.y>CH-RAIL)return;
  aimDragging=true;aimOrigin={...p};aimCurrent={...p};
}
function canMove(e){if(!aimDragging)return;aimCurrent=getCP(e);}
function canUp(e){
  if(!aimDragging)return;aimDragging=false;
  const p=getCP(e);
  // 释放点在球桌外则不击球
  if(p.x<RAIL||p.x>CW-RAIL||p.y<RAIL||p.y>CH-RAIL)return;
  const dx=aimOrigin.x-p.x,dy=aimOrigin.y-p.y,dist=Math.hypot(dx,dy);
  if(dist<5)return;
  const dragPwr=Math.min(100,dist*0.8);
  const fp=Math.round(power*.5+dragPwr*.5);
  shoot(dx,dy,Math.min(100,fp));
}

// ═══ LOG ═══
function addLog(msg,type=''){
  const log=document.getElementById('gameLog');
  const d=document.createElement('div');d.className='li'+(type?' '+type:'');d.textContent=msg;
  log.appendChild(d);log.scrollTop=log.scrollHeight;
  while(log.children.length>25)log.removeChild(log.firstChild);
}

// ═══ TOAST ═══
let tT=null;
function showToast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),2200);
}

// ═══ PEERJS ═══
function initPeer(){
  const rid='pool-'+Math.random().toString(36).substr(2,6).toUpperCase();
  peer=new Peer(rid,{debug:0,config:{iceServers:[{urls:'stun:stun.l.google.com:19302'}]}});
  peer.on('open',id=>{
    document.getElementById('myPeerIdText').textContent=id;
    document.getElementById('netDot').className='dot on';
    document.getElementById('netStatus').textContent='就绪';
    addLog('联机服务启动','info');
  });
  peer.on('connection',c=>{
    if(conn){c.close();return;}conn=c;isHost=true;onlineMode=true;myPlayerId=1;
    setupPC();document.getElementById('modeLabel').textContent='联机·P1';
    showToast('对方已连接！你是玩家1');addLog('P2已连接','info');syncState();
  });
  peer.on('error',e=>{
    document.getElementById('netDot').className='dot';
    document.getElementById('netStatus').textContent='失败';
    addLog('网络错误:'+e.type,'bad');onlineMode=false;
  });
}
function connectToPeer(){
  const id=document.getElementById('connectInput').value.trim();
  if(!id){showToast('请输入对方ID');return;}
  if(!peer){showToast('网络未就绪');return;}
  document.getElementById('netDot').className='dot wait';
  document.getElementById('netStatus').textContent='连接中…';
  conn=peer.connect(id,{reliable:true});
  setupPC();isHost=false;onlineMode=true;myPlayerId=2;
  document.getElementById('modeLabel').textContent='联机·P2';
}
function setupPC(){
  function onOpen(){
    document.getElementById('netDot').className='dot on';
    document.getElementById('netStatus').textContent='已连接';
    showToast('联机成功！');
  }
  // 修复：如果连接已开启（open事件在监听到达前就触发了），直接更新UI
  if(conn.open){onOpen();}
  else{conn.on('open',onOpen);}
  conn.on('data',onData);
  conn.on('close',()=>{document.getElementById('netDot').className='dot on';document.getElementById('netStatus').textContent='就绪';onlineMode=false;conn=null;addLog('对方断开','bad');});
  conn.on('error',e=>addLog('连接错误','bad'));
}
function onData(data){
  if(data.type==='shot'){const cue=getBall(0);if(!cue)return;cue.x=data.cueX;cue.y=data.cueY;if(data.cueOfs)Object.assign(cueOfs,data.cueOfs);if(data.bih!==undefined){ballInHand=data.bih;updBallInHandUI();}shoot(data.dx,data.dy,data.pwr,true);}
  else if(data.type==='place'){const cue=getBall(0);if(!cue)return;cue.x=data.x;cue.y=data.y;cue.pocketed=false;ballInHand=false;updBallInHandUI();addLog('对方放置了母球','info');}
  else if(data.type==='state'&&!isHost)applyState(data.state);
  else if(data.type==='reset')resetGame();
}
function syncState(){
  if(!conn||!conn.open||!isHost)return;
  conn.send({type:'state',state:{balls:balls.map(b=>({id:b.id,x:b.x,y:b.y,vx:b.vx,vy:b.vy,pocketed:b.pocketed})),currentPlayer,playerTypes,scores,firstBreak,gameOver,ballInHand}});
}
function applyState(s){
  currentPlayer=s.currentPlayer;playerTypes=s.playerTypes;scores=s.scores;firstBreak=s.firstBreak;gameOver=s.gameOver;
  if(s.ballInHand!==undefined){ballInHand=s.ballInHand;updBallInHandUI();}
  document.getElementById('pts1').textContent=scores[1];document.getElementById('pts2').textContent=scores[2];
  for(const bs of s.balls){const l=getBall(bs.id);if(l){l.x=bs.x;l.y=bs.y;l.vx=bs.vx;l.vy=bs.vy;if(bs.pocketed&&!l.pocketed){l.pocketed=true;updateTray(bs.id);}}}
  updTypeUI();updTurnUI();
}
function disconnectPeer(){if(conn){conn.close();conn=null;}onlineMode=false;document.getElementById('netDot').className='dot on';document.getElementById('netStatus').textContent='就绪';document.getElementById('modeLabel').textContent='本地/联机';addLog('已断开','info');}
function copyId(){const id=document.getElementById('myPeerIdText').textContent;if(!id||id==='—')return;navigator.clipboard.writeText(id).then(()=>showToast('ID已复制'));}

// ═══ RESPONSIVE CANVAS SIZING ═══
function resizeCanvas(){
  const wrap=document.getElementById('canvasWrap');
  const ww=wrap.clientWidth-12,wh=wrap.clientHeight-12;
  // maintain 700:380 aspect
  const ratio=700/380;
  let w=ww,h=ww/ratio;
  if(h>wh){h=wh;w=wh*ratio;}
  canvas.style.width=Math.floor(w)+'px';
  canvas.style.height=Math.floor(h)+'px';
  canvasRect=null; // invalidate cache
}

// ═══ INIT ═══
window.onload=function(){
  canvas=document.getElementById('gameCanvas');
  canvas.width=CW;canvas.height=CH;
  ctx=canvas.getContext('2d');

  setupPockets();setupBalls();buildTrays();initDial();updatePower(50);updTurnUI();
  resizeCanvas();
  window.addEventListener('resize',resizeCanvas);

  canvas.addEventListener('mousedown',canDown);
  canvas.addEventListener('mousemove',canMove);
  canvas.addEventListener('mouseup',canUp);
  canvas.addEventListener('mouseleave',()=>{aimDragging=false;});
  canvas.addEventListener('touchstart',e=>{e.preventDefault();canDown(e);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();canMove(e);},{passive:false});
  canvas.addEventListener('touchend',e=>{e.preventDefault();canUp(e);},{passive:false});

  gameLoop();
  try{initPeer();}catch(e){addLog('联机不可用','info');}
};
</script>
